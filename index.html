<style>
:root {
  --ink: #2a2622;
  --ink2: #6a6258;
  --ink3: #9a9288;
  --paper: #f7f3ea;
  --card: #fffdf8;
  --line: #e6ddcc;
  --accent: #2e86a8;
  --accent-ink: #1f5f78;
  --shadow: 0 1px 2px rgba(60,50,30,.04), 0 6px 20px rgba(60,50,30,.07);
  --shadow-hover: 0 2px 4px rgba(60,50,30,.06), 0 12px 32px rgba(60,50,30,.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  background: radial-gradient(120% 60% at 50% -10%, #fbf8f1 0%, var(--paper) 60%) fixed;
  color: var(--ink);
  font-family: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 64px 20px 100px;
}

/* Header */
header {
  margin-bottom: 64px;
}

.site-name {
  font-family: "Shippori Mincho", serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: .15em;
  color: var(--ink2);
  margin-bottom: 36px;
  display: block;
}

.headline {
  font-family: "Shippori Mincho", serif;
  font-weight: 800;
  font-size: clamp(2rem, 7vw, 3.2rem);
  letter-spacing: .02em;
  line-height: 1.2;
  margin-bottom: 16px;
  color: var(--ink);
}

.headline .accent { color: var(--accent); }

.desc {
  color: var(--ink2);
  font-size: .92rem;
  max-width: 52ch;
  line-height: 1.7;
}

/* Section */
.section-label {
  font-size: .74rem;
  letter-spacing: .2em;
  color: var(--ink3);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

/* Works grid */
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  margin-bottom: 60px;
}

.work-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 28px 24px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  position: relative;
  overflow: hidden;
}

.work-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity .2s ease;
}

.work-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: #d6ccbb;
}

.work-card:hover::before {
  opacity: 1;
}

.work-emoji {
  font-size: 2rem;
  line-height: 1;
}

.work-title {
  font-family: "Shippori Mincho", serif;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: .02em;
  color: var(--ink);
  line-height: 1.35;
}

.work-subtitle {
  font-size: .8rem;
  color: var(--accent-ink);
  font-weight: 700;
  letter-spacing: .08em;
}

.work-desc {
  font-size: .85rem;
  color: var(--ink2);
  line-height: 1.65;
  flex: 1;
}

.work-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.tag {
  font-size: .72rem;
  color: var(--ink3);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 10px;
  font-weight: 500;
}

.work-arrow {
  font-size: .85rem;
  color: var(--accent);
  margin-top: 4px;
  font-weight: 700;
  letter-spacing: .05em;
}

/* Footer */
footer {
  padding-top: 40px;
  border-top: 1px solid var(--line);
  color: var(--ink3);
  font-size: .8rem;
  letter-spacing: .05em;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="site-name">yom / works</span>
    <h1 class="headline">制作物<span class="accent">一覧</span></h1>
    <p class="desc">作ったツールやウェブアプリをまとめています。</p>
  </header>

  <p class="section-label">Projects</p>

  <div class="works-grid">

    <!-- ShiftCraft -->
    <a class="work-card" href="https://shift-saas-two.vercel.app" target="_blank" rel="noopener">
      <div class="work-emoji">📅</div>
      <div>
        <div class="work-subtitle">業務ツール / SaaS</div>
        <div class="work-title">ShiftCraft</div>
      </div>
      <div class="work-desc">シフト希望の収集から自動生成・公開までをカバーするシフト管理 SaaS。スタッフ招待・気遣い設定・ルーム管理に対応。</div>
      <div class="work-tags">
        <span class="tag">Next.js</span>
        <span class="tag">Supabase</span>
        <span class="tag">シフト管理</span>
      </div>
      <div class="work-arrow">アプリを開く →</div>
    </a>

    <!-- 旬めぐり栄養ナビ -->
    <a class="work-card" href="works/旬めぐり栄養ナビ.html">
      <div class="work-emoji">🌿</div>
      <div>
        <div class="work-subtitle">食・健康</div>
        <div class="work-title">旬めぐり 栄養ナビ</div>
      </div>
      <div class="work-desc">月ごとの旬食材を、低AGE・疲労回復の観点でナビゲート。季節に寄り添う食材選びをサポート。</div>
      <div class="work-tags">
        <span class="tag">栄養</span>
        <span class="tag">旬食材</span>
        <span class="tag">低AGE</span>
      </div>
      <div class="work-arrow">開く →</div>
    </a>

  <footer>
    &copy; 2026 yom

</div>
